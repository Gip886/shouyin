services:
  postgres:
    image: postgres:16-alpine
    container_name: shouyin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shouyin
      POSTGRES_PASSWORD: shouyin
      POSTGRES_DB: shouyin
    ports:
      - "5432:5432"
    volumes:
      - shouyin-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shouyin"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: shouyin-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  shouyin-pg:
