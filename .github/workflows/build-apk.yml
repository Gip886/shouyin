name: Build Android APK

# 什么时候跑:
# - 推到 master/main 分支且改了 mobile 相关文件时(自动)
# - 手动在 Actions 页面点"Run workflow"(临时打)
# - 打 tag v* 时,顺手挂到 Release
on:
  push:
    branches: [master, main]
    tags: ['v*']
    paths:
      - 'apps/mobile/**'
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/build-apk.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 装 JDK 21(Capacitor 7 要求)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 mobile Web 资产
        run: pnpm --filter @shouyin/mobile build

      # 首次跑 CI 时 apps/mobile/android 不存在,让 Capacitor 生成它。
      # 每次 CI 都重建 android 工程是安全的:所有代码都在 apps/mobile/src 下,原生工程只是壳。
      - name: 生成 Capacitor Android 工程
        working-directory: apps/mobile
        run: |
          if [ ! -d "android" ]; then
            pnpm exec cap add android
          fi
          pnpm exec cap sync android

      # 补 CAMERA 权限:@capacitor-mlkit/barcode-scanning 理论上会通过
      # manifest merger 自动合并进来,但实测某些 Capacitor 7 + AGP 版本组合下漏了。
      # 直接改 AndroidManifest.xml 最保险 —— 没声明的话系统"应用权限"里根本不出现"相机",
      # 权限申请也永远拿不到 granted。
      #
      # 同时确保 usesCleartextTraffic="true":Android 9+ 默认禁明文 HTTP,
      # 我们的局域网后端是 http://192.168.x.x:3001,不开这个 WebView 里的 XHR 会被
      # 静默拦截,表现就是 axios 直接 Network Error。
      - name: 补写 AndroidManifest.xml(CAMERA 权限 + 明文 HTTP)
        working-directory: apps/mobile/android/app/src/main
        run: |
          MANIFEST=AndroidManifest.xml
          echo "--- 原 manifest ---"
          cat "$MANIFEST"

          # 1) CAMERA 权限
          if grep -q 'android.permission.CAMERA' "$MANIFEST"; then
            echo "CAMERA 权限已存在,不重复加"
          else
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n</manifest>|' "$MANIFEST"
            echo "已补 CAMERA"
          fi

          # 2) usesCleartextTraffic:如果 <application ...> 已有属性,覆盖为 true;
          #    没有就在 <application 后加。用 python 更靠谱,sed 处理 xml 属性容易出错。
          python3 << 'PY'
          import re
          p = 'AndroidManifest.xml'
          s = open(p).read()
          if 'android:usesCleartextTraffic' in s:
              s = re.sub(r'android:usesCleartextTraffic="[^"]*"', 'android:usesCleartextTraffic="true"', s)
          else:
              s = s.replace('<application', '<application\n        android:usesCleartextTraffic="true"', 1)
          open(p, 'w').write(s)
          PY

          echo "--- 新 manifest ---"
          cat "$MANIFEST"

      # gradlew 是 checkout 下来的普通文件,CI 上 shebang 是保留的但可执行位可能没:显式赋权
      - name: 赋 gradlew 可执行位
        working-directory: apps/mobile/android
        run: chmod +x gradlew

      - name: gradle assembleDebug 打 APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 找到 APK 并展示大小
        id: locate
        run: |
          APK=$(find apps/mobile/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "打出的 APK:"
          ls -lh "$APK"

      # 每次跑完 CI 都把 APK 存 90 天,直接从 Actions 页面下载
      - name: 上传 Artifact(90 天保留)
        uses: actions/upload-artifact@v4
        with:
          name: shouyin-mobile-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      # 打 tag(比如 v0.2.0)时,自动挂到 GitHub Release,方便员工直接下载
      - name: 挂到 Release(仅 tag 触发时)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
